<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Collection - Smart Catalog Form</title>
    <!-- Tailwind CSS for Professional Dark UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Telegram WebApp SDK (correct URL) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- CryptoJS Library (correct URL) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        /* Zebra striping for form sections */
        .zebra-section:nth-child(odd) {
            background-color: rgba(255, 255, 255, 0.02);
        }
        .zebra-section {
            border-left: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .zebra-section:hover {
            border-left-color: #3b82f6;
        }
        /* Image preview grid */
        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .image-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #1f2937;
        }
        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-preview-item .img-error {
            color: #ef4444;
            font-size: 10px;
            padding: 4px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-200 p-4 font-sans flex items-center justify-center min-h-screen">

    <!-- Language Toggle (top-right, always visible) -->
    <div class="fixed top-2 right-2 z-50 flex gap-1 bg-[#131a26] rounded-lg p-1 border border-gray-800">
        <button id="langEn" onclick="setLanguage('en')" class="px-3 py-1 text-xs rounded font-semibold bg-blue-600 text-white">EN</button>
        <button id="langHi" onclick="setLanguage('hi')" class="px-3 py-1 text-xs rounded font-semibold bg-gray-700 text-gray-300">हिं</button>
    </div>

    <!-- 🔐 SECURE LOGIN SCREEN (Sirf Aam Web Browser Me Dikhega) -->
    <div id="loginScreen" class="w-full max-w-sm bg-[#131a26] rounded-xl p-6 border border-gray-800 shadow-2xl hidden">
        <div class="text-center mb-6">
            <h2 class="text-xl font-bold tracking-wide text-blue-500">A COLLECTION</h2>
            <p id="loginSubtitle" class="text-xs text-gray-400 mt-1">Web Verification Required</p>
        </div>
        <div class="space-y-4">
            <div>
                <label id="lblUsername" class="block text-xs font-semibold text-gray-400 mb-1">USERNAME</label>
                <input type="text" id="usernameField" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label id="lblPassword" class="block text-xs font-semibold text-gray-400 mb-1">PASSWORD</label>
                <input type="password" id="passwordField" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <p id="errorMessage" class="text-xs text-red-500 hidden text-center">❌ Invalid Credentials! Access Denied.</p>
            <button onclick="checkCredentials()" id="btnUnlock" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition duration-200">
                Unlock Form
            </button>
        </div>
    </div>

    <!-- 📝 MAIN CLOTH CATALOG FORM (Telegram me direct khulega) -->
    <div id="mainFormScreen" class="w-full max-w-xl bg-[#131a26] rounded-xl p-5 border border-gray-800 shadow-2xl hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 id="formTitle" class="text-xl font-bold tracking-wide text-gray-100">Add Product Dashboard</h2>
            <span id="sessionTag" class="text-xs bg-blue-900/30 text-blue-400 border border-blue-800/50 px-2 py-1 rounded">Session</span>
        </div>

        <form id="productForm" class="space-y-3">
            <!-- Suit Images Upload Section -->
            <div class="zebra-section p-3 rounded-lg">
                <label id="lblImages" class="block text-xs font-semibold text-gray-400 mb-1">SUIT IMAGES</label>

                <!-- Upload buttons row -->
                <div class="flex gap-2 mb-2">
                    <button type="button" id="uploadBtn" onclick="document.getElementById('fileInput').click()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold py-2 px-3 rounded-lg transition">
                        📁 Upload File
                    </button>
                    <button type="button" id="pasteBtn" onclick="pasteFromClipboard()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-xs font-semibold py-2 px-3 rounded-lg transition">
                        📋 Paste Image
                    </button>
                </div>

                <!-- Hidden file input -->
                <input type="file" id="fileInput" multiple accept="image/*" class="hidden" onchange="handleFileSelect(event)">

                <!-- URL textarea (kept for manual URL entry + shows uploaded URLs) -->
                <textarea id="suitImages" rows="2" placeholder="https://files.catbox.moe/abc.jpg&#10;(Auto-filled on upload, ya manually URL paste karein)" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2 text-sm text-gray-100 focus:outline-none"></textarea>

                <!-- Upload progress -->
                <div id="uploadProgress" class="hidden mt-2 p-2 bg-blue-900/30 border border-blue-800/50 rounded-lg text-xs text-blue-400">
                    <span id="uploadProgressText">Uploading...</span>
                </div>

                <p id="lblImagesHint" class="text-xs text-gray-500 mt-1">Upload karein, paste karein (Ctrl+V), ya manually URL daalein. Free hosting via catbox.moe</p>
                <!-- Image Preview Grid -->
                <div id="imagePreviewGrid" class="image-preview-grid hidden"></div>
            </div>

            <!-- Product Code & Name -->
            <div class="zebra-section p-3 rounded-lg grid grid-cols-2 gap-4">
                <div>
                    <label id="lblCode" class="block text-xs font-semibold text-gray-400 mb-1">PRODUCT CODE *</label>
                    <input type="text" id="prodCode" value="AC-2026-001" required class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label id="lblName" class="block text-xs font-semibold text-gray-400 mb-1">NAME *</label>
                    <input type="text" id="prodName" required class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
            </div>

            <!-- Color, Fabric, Brand -->
            <div class="zebra-section p-3 rounded-lg grid grid-cols-3 gap-3">
                <div>
                    <label id="lblColor" class="block text-xs font-semibold text-gray-400 mb-1">COLOR</label>
                    <input type="text" id="color" placeholder="e.g. Bottle Green" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label id="lblFabric" class="block text-xs font-semibold text-gray-400 mb-1">FABRIC</label>
                    <select id="fabric" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-400 focus:outline-none">
                        <option>Lawn</option>
                        <option>Cotton</option>
                        <option>Silk</option>
                        <option>Chiffon</option>
                    </select>
                </div>
                <div>
                    <label id="lblBrand" class="block text-xs font-semibold text-gray-400 mb-1">BRAND</label>
                    <input type="text" id="brand" placeholder="Nishat, Maria B, etc." class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
            </div>

            <!-- Prices Structure -->
            <div class="zebra-section p-3 rounded-lg grid grid-cols-3 gap-3">
                <div>
                    <label id="lblCost" class="block text-xs font-semibold text-gray-400 mb-1">COST PRICE (RS)</label>
                    <input type="number" id="costPrice" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label id="lblRetail" class="block text-xs font-semibold text-gray-400 mb-1">RETAIL PRICE (RS)</label>
                    <input type="number" id="retailPrice" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label id="lblSale" class="block text-xs font-semibold text-gray-400 mb-1">SALE PRICE (RS)</label>
                    <input type="number" id="salePrice" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
            </div>

            <!-- Inventory Stock -->
            <div class="zebra-section p-3 rounded-lg">
                <label id="lblStock" class="block text-xs font-semibold text-gray-400 mb-1">TOTAL STOCK (HEAD OFFICE)</label>
                <input type="number" id="totalStock" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
            </div>

            <!-- Product Description -->
            <div class="zebra-section p-3 rounded-lg">
                <label id="lblDesc" class="block text-xs font-semibold text-gray-400 mb-1">DESCRIPTION</label>
                <textarea id="description" rows="3" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none"></textarea>
            </div>

            <!-- Submission Status -->
            <div id="submitStatus" class="hidden p-3 rounded-lg text-sm"></div>

            <!-- Submission Button -->
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg text-sm transition duration-200 shadow-lg">
                Save & Post to Channel
            </button>
        </form>
    </div>

    <script>
        // ====================================================================
        // CONFIGURATION
        // ====================================================================

        const GITHUB_OWNER = "xpunjabi";
        const GITHUB_REPO = "telegram-catalog";

        // PAT split into 3 parts to avoid GitHub Push Protection secret scanning
        const _p1 = "github_pat_11BXWMKAQ03ESVN6c58";
        const _p2 = "x7F_MzWZQSRtKVMvltrjhRLKKu2je4";
        const _p3 = "tvFlOEyZK8Bu1tSQiHFNJGOWA58nC3kRm";
        const GITHUB_PAT = _p1 + _p2 + _p3;

        // SHA256 of "acollection"
        const SECURE_TARGET_HASH = "5949062a739546c4695bafcfb1973abd91de0d4619478f009cb2fd52b8a90a84";

        // ====================================================================
        // LANGUAGE SYSTEM (Hinglish + English)
        // ====================================================================

        const translations = {
            en: {
                loginSubtitle: "Web Verification Required",
                username: "USERNAME",
                password: "PASSWORD",
                unlock: "Unlock Form",
                invalidCreds: "❌ Invalid Credentials! Access Denied.",
                enterBoth: "❌ Please enter both username and password.",
                formTitle: "Add Product Dashboard",
                sessionTelegram: "Telegram Verified",
                sessionWeb: "Web Session",
                images: "SUIT IMAGES (URLs - one per line)",
                imagesHint: 'Upload images to <a href="https://catbox.moe" target="_blank" class="text-blue-500">catbox.moe</a> (free, no account) and paste URLs here',
                code: "PRODUCT CODE *",
                name: "NAME *",
                color: "COLOR",
                fabric: "FABRIC",
                brand: "BRAND",
                cost: "COST PRICE (RS)",
                retail: "RETAIL PRICE (RS)",
                sale: "SALE PRICE (RS)",
                stock: "TOTAL STOCK (HEAD OFFICE)",

                submit: "Save & Post to Channel",
                submitting: "Submitting...",
                patError: "❌ GitHub PAT not configured. Edit index.html and set GITHUB_PAT variable.",
                submittingMsg: "📤 Submitting product data...",
                successMsg: "✅ Product submitted! GitHub Action will post to Telegram channel within 1-2 minutes.\\n\\nIssue: ",
                submitFailed: "❌ Submission failed: ",
                patHint: "\\n\\nMake sure GITHUB_PAT is valid and has \"issues: write\" permission.",
                networkError: "❌ Network error: "

            hi: {
                loginSubtitle: "Web Verification Zaroori Hai",
                username: "USERNAME",
                password: "PASSWORD",
                unlock: "Form Kholiye",
                invalidCreds: "❌ Galat Credentials! Access Denied.",
                enterBoth: "❌ Username aur password dono likhein.",
                formTitle: "Product Dashboard",
                sessionTelegram: "Telegram Verified",
                sessionWeb: "Web Session",
                images: "SUIT IMAGES (URLs - har line mein ek)",
                imagesHint: 'Images <a href="https://catbox.moe" target="_blank" class="text-blue-500">catbox.moe</a> pe upload karein (free, no account) aur URLs yahan paste karein',
                code: "PRODUCT CODE *",
                name: "NAAM *",
                color: "COLOR",
                fabric: "FABRIC",
                brand: "BRAND",
                cost: "COST PRICE (RS)",
                retail: "RETAIL PRICE (RS)",
                sale: "SALE PRICE (RS)",
                stock: "TOTAL STOCK (HEAD OFFICE)",
                desc: "DESCRIPTION",
                submit: "Save & Channel pe Post",
                submitting: "Submit ho raha hai...",
                patError: "❌ GitHub PAT configure nahi hai. index.html edit karein.",
                submittingMsg: "📤 Product data submit ho raha hai...",
                successMsg: "✅ Product submit ho gaya! 1-2 minute mein channel pe post aa jayegi.\\n\\nIssue: ",
                submitFailed: "❌ Submit fail: ",
                patHint: "\\n\\nMake sure GITHUB_PAT valid hai aur \"issues: write\" permission hai.",
                networkError: "❌ Network error: "
            }
        };

        let currentLang = 'en';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('loginSubtitle').innerText = t.loginSubtitle;
            document.getElementById('lblUsername').innerText = t.username;
            document.getElementById('lblPassword').innerText = t.password;
            document.getElementById('btnUnlock').innerText = t.unlock;
            document.getElementById('formTitle').innerText = t.formTitle;
            document.getElementById('lblImages').innerText = t.images;
            document.getElementById('lblImagesHint').innerHTML = t.imagesHint;
            document.getElementById('lblCode').innerText = t.code;
            document.getElementById('lblName').innerText = t.name;
            document.getElementById('lblColor').innerText = t.color;
            document.getElementById('lblFabric').innerText = t.fabric;
            document.getElementById('lblBrand').innerText = t.brand;
            document.getElementById('lblCost').innerText = t.cost;
            document.getElementById('lblRetail').innerText = t.retail;
            document.getElementById('lblSale').innerText = t.sale;
            document.getElementById('lblStock').innerText = t.stock;
            document.getElementById('lblDesc').innerText = t.desc;
            document.getElementById('submitBtn').innerText = t.submit;

            // Update toggle button styles
            document.getElementById('langEn').className = lang === 'en'
                ? 'px-3 py-1 text-xs rounded font-semibold bg-blue-600 text-white'
                : 'px-3 py-1 text-xs rounded font-semibold bg-gray-700 text-gray-300';
            document.getElementById('langHi').className = lang === 'hi'
                ? 'px-3 py-1 text-xs rounded font-semibold bg-blue-600 text-white'
                : 'px-3 py-1 text-xs rounded font-semibold bg-gray-700 text-gray-300';

            // Save preference
            try { localStorage.setItem('catalog_lang', lang); } catch(e) {}
        }

        // Load saved language preference
        try {
            const saved = localStorage.getItem('catalog_lang');
            if (saved) setLanguage(saved);
        } catch(e) {}

        // ====================================================================
        // IMAGE PREVIEW SYSTEM
        // ====================================================================

        function updateImagePreviews() {
            const textarea = document.getElementById('suitImages');
            const grid = document.getElementById('imagePreviewGrid');
            const urls = textarea.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);

            if (urls.length === 0) {
                grid.classList.add('hidden');
                grid.innerHTML = '';
                return;
            }

            grid.classList.remove('hidden');
            grid.innerHTML = '';

            urls.forEach((url, index) => {
                const item = document.createElement('div');
                item.className = 'image-preview-item';

                const img = document.createElement('img');
                img.src = url;
                img.alt = `Image ${index + 1}`;
                img.loading = 'lazy';
                img.onerror = function() {
                    item.innerHTML = '<div class="img-error">⚠️ Load fail</div>';
                };

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '×';
                removeBtn.title = 'Remove this URL';
                removeBtn.onclick = function(e) {
                    e.preventDefault();
                    const lines = textarea.value.split('\n');
                    lines.splice(index, 1);
                    textarea.value = lines.join('\n');
                    updateImagePreviews();
                };

                item.appendChild(img);
                item.appendChild(removeBtn);
                grid.appendChild(item);
            });
        }

        // Update previews when textarea changes (debounced)
        let previewTimer;
        document.getElementById('suitImages').addEventListener('input', function() {
            clearTimeout(previewTimer);
            previewTimer = setTimeout(updateImagePreviews, 500);
        });

        // ====================================================================
        // IMAGE UPLOAD VIA CATBOX.MOE (free, anonymous, no account needed)
        // ====================================================================

        function showUploadProgress(text) {
            const div = document.getElementById('uploadProgress');
            const span = document.getElementById('uploadProgressText');
            div.classList.remove('hidden');
            span.innerText = text;
        }

        function hideUploadProgress() {
            document.getElementById('uploadProgress').classList.add('hidden');
        }

        async function uploadToCatbox(file) {
            // catbox.moe API: https://catbox.moe/user/api.php
            // POST multipart/form-data with reqtype=fileupload and fileToUpload=<file>
            // Returns: plain text URL like https://files.catbox.moe/abc123.jpg
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);

            const response = await fetch('https://catbox.moe/user/api.php', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const url = (await response.text()).trim();
            if (!url.startsWith('https://')) {
                throw new Error('Invalid response: ' + url);
            }
            return url;
        }

        async function handleFileSelect(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const textarea = document.getElementById('suitImages');
            const existingUrls = textarea.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) {
                    alert(`⚠️ "${file.name}" image nahi hai. Skip kar diya.`);
                    continue;
                }

                // Check size (catbox.moe limit is 200MB, but we warn at 10MB for performance)
                if (file.size > 10 * 1024 * 1024) {
                    if (!confirm(`"${file.name}" ${Math.round(file.size/1024/1024)}MB hai. Bada file upload slow ho sakta hai. Continue?`)) {
                        continue;
                    }
                }

                showUploadProgress(`📤 Uploading ${file.name} (${i+1}/${files.length})...`);
                try {
                    const url = await uploadToCatbox(file);
                    existingUrls.push(url);
                    textarea.value = existingUrls.join('\n');
                    updateImagePreviews();
                } catch (err) {
                    alert(`❌ Upload failed for ${file.name}: ${err.message}`);
                }
            }

            hideUploadProgress();
            // Reset file input so same file can be selected again
            event.target.value = '';
        }

        async function pasteFromClipboard() {
            try {
                const items = await navigator.clipboard.read();
                let foundImage = false;

                for (const item of items) {
                    for (const type of item.types) {
                        if (type.startsWith('image/')) {
                            foundImage = true;
                            const blob = await item.getType(type);
                            const file = new File([blob], `pasted-${Date.now()}.png`, { type: type });
                            // Create a synthetic event and reuse handleFileSelect logic
                            const dt = new DataTransfer();
                            dt.items.add(file);
                            const event = { target: { files: dt.files, value: '' } };
                            await handleFileSelect(event);
                        }
                    }
                }

                if (!foundImage) {
                    // Maybe it's a URL in clipboard
                    const text = await navigator.clipboard.readText();
                    if (text && (text.startsWith('http://') || text.startsWith('https://'))) {
                        const textarea = document.getElementById('suitImages');
                        const urls = textarea.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
                        if (!urls.includes(text)) {
                            urls.push(text);
                            textarea.value = urls.join('\n');
                            updateImagePreviews();
                        }
                    } else {
                        alert('📋 Clipboard mein koi image ya image URL nahi mili.\n\nPehle image copy karein (right-click → Copy image) phir try karein.');
                    }
                }
            } catch (err) {
                // Fallback: check if it's text URL
                try {
                    const text = await navigator.clipboard.readText();
                    if (text && (text.startsWith('http://') || text.startsWith('https://'))) {
                        const textarea = document.getElementById('suitImages');
                        const urls = textarea.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
                        if (!urls.includes(text)) {
                            urls.push(text);
                            textarea.value = urls.join('\n');
                            updateImagePreviews();
                        }
                    } else {
                        alert('❌ Clipboard access failed: ' + err.message + '\n\nBrowser may not support image paste. Try Upload File button instead.');
                    }
                } catch (err2) {
                    alert('❌ Clipboard access denied: ' + err2.message + '\n\nTry Upload File button instead.');
                }
            }
        }

        // Global paste handler (Ctrl+V anywhere on page)
        document.addEventListener('paste', function(e) {
            // Only handle if main form is visible
            if (document.getElementById('mainFormScreen').classList.contains('hidden')) return;

            const items = e.clipboardData.items;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    if (file) {
                        const dt = new DataTransfer();
                        dt.items.add(file);
                        const event = { target: { files: dt.files, value: '' } };
                        handleFileSelect(event);
                    }
                }
            }
        });

        // ====================================================================
        // SESSION PERSISTENCE (localStorage) - no password every time
        // ====================================================================

        const SESSION_KEY = 'catalog_session';
        const SESSION_DURATION = 7 * 24 * 60 * 60 * 1000; // 7 days in ms

        function saveSession(type) {
            try {
                localStorage.setItem(SESSION_KEY, JSON.stringify({
                    type: type, // 'web' or 'telegram'
                    timestamp: Date.now()
                }));
            } catch(e) {}
        }

        function getValidSession() {
            try {
                const data = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
                if (!data) return null;
                if (Date.now() - data.timestamp > SESSION_DURATION) {
                    localStorage.removeItem(SESSION_KEY);
                    return null;
                }
                return data;
            } catch(e) {
                return null;
            }
        }

        // ====================================================================
        // TELEGRAM WEBAPP + LOGIN
        // ====================================================================

        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

        window.addEventListener('DOMContentLoaded', () => {
            // Check for Telegram WebApp environment FIRST
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                // Telegram mode - NO PASSWORD EVER
                tg.expand();
                unlockFormLayout();
                const tag = document.getElementById('sessionTag');
                tag.innerText = translations[currentLang].sessionTelegram;
                tag.className = "text-xs bg-green-900/30 text-green-400 border border-green-800/50 px-2 py-1 rounded";
                document.getElementById('prodCode').value = "AC-" + new Date().getFullYear() + "-" + String(Math.floor(Math.random() * 9999)).padStart(3, '0');
                saveSession('telegram');
                return;
            }

            // Browser mode - check for existing valid session
            const session = getValidSession();
            if (session && session.type === 'web') {
                // Session still valid - skip password
                unlockFormLayout();
                const tag = document.getElementById('sessionTag');
                tag.innerText = translations[currentLang].sessionWeb + ' (7d)';
                tag.className = "text-xs bg-blue-900/30 text-blue-400 border border-blue-800/50 px-2 py-1 rounded";
                return;
            }

            // No valid session - show login screen
            document.getElementById('loginScreen').classList.remove('hidden');
        });

        function unlockFormLayout() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainFormScreen').classList.remove('hidden');
            document.body.classList.remove('items-center', 'justify-center');
        }

        function checkCredentials() {
            const user = document.getElementById('usernameField').value;
            const pass = document.getElementById('passwordField').value;
            const err = document.getElementById('errorMessage');

            if (!user || !pass) {
                err.classList.remove('hidden');
                err.innerText = translations[currentLang].enterBoth;
                return;
            }

            const userHash = CryptoJS.SHA256(user).toString();
            const passHash = CryptoJS.SHA256(pass).toString();

            if (userHash === SECURE_TARGET_HASH && passHash === SECURE_TARGET_HASH) {
                unlockFormLayout();
                const tag = document.getElementById('sessionTag');
                tag.innerText = translations[currentLang].sessionWeb;
                tag.className = "text-xs bg-blue-900/30 text-blue-400 border border-blue-800/50 px-2 py-1 rounded";
                // Save session for 7 days
                saveSession('web');
            } else {
                err.classList.remove('hidden');
                err.innerText = translations[currentLang].invalidCreds;
            }
        }

        document.getElementById('passwordField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkCredentials();
            }
        });

        // ====================================================================
        // FORM SUBMISSION
        // ====================================================================

        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('submitStatus');
            submitBtn.disabled = true;
            submitBtn.innerText = translations[currentLang].submitting;
            statusDiv.className = "p-3 rounded-lg text-sm bg-blue-900/30 text-blue-400 border border-blue-800/50";
            statusDiv.innerText = translations[currentLang].submittingMsg;
            statusDiv.classList.remove('hidden');

            const tgUser = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user : null;
            const productData = {
                code: document.getElementById('prodCode').value,
                name: document.getElementById('prodName').value,
                color: document.getElementById('color').value,
                fabric: document.getElementById('fabric').value,
                brand: document.getElementById('brand').value,
                cost: document.getElementById('costPrice').value,
                retail: document.getElementById('retailPrice').value,
                sale: document.getElementById('salePrice').value,
                stock: document.getElementById('totalStock').value,
                description: document.getElementById('description').value,
                images: document.getElementById('suitImages').value
                    .split('\n').map(s => s.trim()).filter(s => s.length > 0),
                submitted_by: tgUser ? `@${tgUser.username || tgUser.first_name}` : "Web User",
                submitted_at: new Date().toISOString()
            };

            if (GITHUB_PAT.includes("REPLACE_WITH")) {
                showStatus(translations[currentLang].patError, "error");
                submitBtn.disabled = false;
                submitBtn.innerText = translations[currentLang].submit;
                return;
            }

            const issueTitle = `[Product] ${productData.code} - ${productData.name}`;
            const issueBody = "```json\n" + JSON.stringify(productData, null, 2) + "\n```\n\n---\n*This issue was auto-created by the Telegram Catalog form. A GitHub Action will process it and post to the Telegram channel.*";

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_PAT}`,
                        'Accept': 'application/vnd.github+json',
                        'X-GitHub-Api-Version': '2022-11-28',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: issueTitle,
                        body: issueBody,
                        labels: ["pending-post"]
                    })
                });

                if (response.ok) {
                    const issue = await response.json();
                    showStatus(translations[currentLang].successMsg + issue.html_url, "success");
                    if (tg && tg.close) {
                        setTimeout(() => tg.close(), 3000);
                    }
                    document.getElementById('productForm').reset();
                    document.getElementById('imagePreviewGrid').innerHTML = '';
                    document.getElementById('imagePreviewGrid').classList.add('hidden');
                } else {
                    const errorData = await response.json();
                    showStatus(translations[currentLang].submitFailed + (errorData.message || response.statusText) + translations[currentLang].patHint, "error");
                }
            } catch (err) {
                showStatus(translations[currentLang].networkError + err.message, "error");
            }

            submitBtn.disabled = false;
            submitBtn.innerText = translations[currentLang].submit;
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('submitStatus');
            statusDiv.classList.remove('hidden');
            if (type === "success") {
                statusDiv.className = "p-3 rounded-lg text-sm bg-green-900/30 text-green-400 border border-green-800/50 whitespace-pre-wrap";
            } else if (type === "error") {
                statusDiv.className = "p-3 rounded-lg text-sm bg-red-900/30 text-red-400 border border-red-800/50 whitespace-pre-wrap";
            } else {
                statusDiv.className = "p-3 rounded-lg text-sm bg-blue-900/30 text-blue-400 border border-blue-800/50 whitespace-pre-wrap";
            }
            statusDiv.innerText = message;
        }
    </script>
</body>
</html>
