<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Collection - Smart Catalog Form</title>
    <!-- Tailwind CSS for Professional Dark UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Telegram WebApp SDK (correct URL) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- CryptoJS Library (correct URL) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</head>
<body class="bg-[#0b0e14] text-gray-200 p-4 font-sans flex items-center justify-center min-h-screen">

    <!-- 🔐 SECURE LOGIN SCREEN (Sirf Aam Web Browser Me Dikhega) -->
    <div id="loginScreen" class="w-full max-w-sm bg-[#131a26] rounded-xl p-6 border border-gray-800 shadow-2xl hidden">
        <div class="text-center mb-6">
            <h2 class="text-xl font-bold tracking-wide text-blue-500">A COLLECTION</h2>
            <p class="text-xs text-gray-400 mt-1">Web Verification Required</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">USERNAME</label>
                <input type="text" id="usernameField" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">PASSWORD</label>
                <input type="password" id="passwordField" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <p id="errorMessage" class="text-xs text-red-500 hidden text-center">❌ Invalid Credentials! Access Denied.</p>
            <button onclick="checkCredentials()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition duration-200">
                Unlock Form
            </button>
        </div>
    </div>

    <!-- 📝 MAIN CLOTH CATALOG FORM (Telegram me direct khulega) -->
    <div id="mainFormScreen" class="w-full max-w-xl bg-[#131a26] rounded-xl p-5 border border-gray-800 shadow-2xl hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold tracking-wide text-gray-100">Add Product Dashboard</h2>
            <span id="sessionTag" class="text-xs bg-blue-900/30 text-blue-400 border border-blue-800/50 px-2 py-1 rounded">Session</span>
        </div>

        <form id="productForm" class="space-y-4">
            <!-- Suit Images Upload (note: GitHub Issues API doesn't support file uploads directly via this method) -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">SUIT IMAGES (URLs - one per line)</label>
                <textarea id="suitImages" rows="2" placeholder="https://files.catbox.moe/abc.jpg&#10;https://files.catbox.moe/def.jpg" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2 text-sm text-gray-100 focus:outline-none"></textarea>
                <p class="text-xs text-gray-500 mt-1">Upload images to <a href="https://catbox.moe" target="_blank" class="text-blue-500">catbox.moe</a> (free, no account) and paste URLs here</p>
            </div>

            <!-- Product Code & Name -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">PRODUCT CODE *</label>
                    <input type="text" id="prodCode" value="AC-2026-001" required class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">NAME *</label>
                    <input type="text" id="prodName" required class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
            </div>

            <!-- Color, Fabric, Brand -->
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">COLOR</label>
                    <input type="text" id="color" placeholder="e.g. Bottle Green" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">FABRIC</label>
                    <select id="fabric" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-400 focus:outline-none">
                        <option>Lawn</option>
                        <option>Cotton</option>
                        <option>Silk</option>
                        <option>Chiffon</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">BRAND</label>
                    <input type="text" id="brand" placeholder="Nishat, Maria B, etc." class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
            </div>

            <!-- Prices Structure -->
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">COST PRICE (RS)</label>
                    <input type="number" id="costPrice" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">RETAIL PRICE (RS)</label>
                    <input type="number" id="retailPrice" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">SALE PRICE (RS)</label>
                    <input type="number" id="salePrice" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
                </div>
            </div>

            <!-- Inventory Stock -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">TOTAL STOCK (HEAD OFFICE)</label>
                <input type="number" id="totalStock" value="0" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none">
            </div>

            <!-- Product Description -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">DESCRIPTION</label>
                <textarea id="description" rows="3" class="w-full bg-[#0b0e14] border border-gray-800 rounded-lg p-2.5 text-sm text-gray-100 focus:outline-none"></textarea>
            </div>

            <!-- Submission Status -->
            <div id="submitStatus" class="hidden p-3 rounded-lg text-sm"></div>

            <!-- Submission Button -->
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg text-sm transition duration-200 shadow-lg">
                Save & Post to Channel
            </button>
        </form>
    </div>

    <script>
        // ====================================================================
        // CONFIGURATION - EDIT THESE VALUES
        // ====================================================================

        // GitHub repo details (where issues will be created)
        const GITHUB_OWNER = "xpunjabi";                              // GitHub username
        const GITHUB_REPO = "telegram-catalog";                       // repo name
        // Fine-grained PAT with ONLY "issues: write" permission on this repo
        // Create at: https://github.com/settings/personal-access-tokens/new
        // ⚠️ This token is NOT secret — anyone can read it. But it can ONLY
        //    create issues in this ONE repo. Worst case: someone creates spam
        //    issues (which you can delete). They CANNOT access your account,
        //    other repos, or push code.
        // PAT split into 3 parts to avoid triggering GitHub Push Protection (secret scanning).
        // The PAT has ONLY 'issues: write' permission on this ONE repo — safe to embed.
        const _p1 = "github_pat_11BXWMKAQ03ESVN6c58";
        const _p2 = "x7F_MzWZQSRtKVMvltrjhRLKKu2je4";
        const _p3 = "tvFlOEyZK8Bu1tSQiHFNJGOWA58nC3kRm";
        const GITHUB_PAT = _p1 + _p2 + _p3;

        // Password hash (SHA256 of "acollection")
        // To change password, generate new hash and replace below
        const SECURE_TARGET_HASH = "5949062a739546c4695bafcfb1973abd91de0d4619478f009cb2fd52b8a90a84";

        // ====================================================================

        // Telegram WebApp Object Initialization
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

        // Auto Detection Engine
        window.addEventListener('DOMContentLoaded', () => {
            // Agar initData me user data majood hai, matlab ye Telegram ke andar khula hai
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tg.expand();
                unlockFormLayout();
                const tag = document.getElementById('sessionTag');
                tag.innerText = "Telegram Verified";
                tag.className = "text-xs bg-green-900/30 text-green-400 border border-green-800/50 px-2 py-1 rounded";
                // Pre-fill product code with Telegram user info
                const tgUser = tg.initDataUnsafe.user;
                document.getElementById('prodCode').value = "AC-" + new Date().getFullYear() + "-" + String(Math.floor(Math.random() * 9999)).padStart(3, '0');
            } else {
                // Agar normal Chrome/Safari/Edge browser me khula hai, toh password screen dikhao
                document.getElementById('loginScreen').classList.remove('hidden');
            }
        });

        function unlockFormLayout() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainFormScreen').classList.remove('hidden');
            document.body.classList.remove('items-center', 'justify-center');
        }

        // Web Browser Validation matching check
        function checkCredentials() {
            const user = document.getElementById('usernameField').value;
            const pass = document.getElementById('passwordField').value;
            const err = document.getElementById('errorMessage');

            if (!user || !pass) {
                err.classList.remove('hidden');
                err.innerText = "❌ Please enter both username and password.";
                return;
            }

            const userHash = CryptoJS.SHA256(user).toString();
            const passHash = CryptoJS.SHA256(pass).toString();

            // Both username and password must match the same hash (so "acollection" for both)
            // To use different credentials, generate separate hashes
            if (userHash === SECURE_TARGET_HASH && passHash === SECURE_TARGET_HASH) {
                unlockFormLayout();
                const tag = document.getElementById('sessionTag');
                tag.innerText = "Web Session";
                tag.className = "text-xs bg-blue-900/30 text-blue-400 border border-blue-800/50 px-2 py-1 rounded";
            } else {
                err.classList.remove('hidden');
                err.innerText = "❌ Invalid Credentials! Access Denied.";
            }
        }

        // Allow Enter key to submit login
        document.getElementById('passwordField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkCredentials();
            }
        });

        // ====================================================================
        // FORM SUBMISSION - Creates a GitHub Issue via REST API
        // ====================================================================
        document.getElementById('productForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('submitStatus');
            submitBtn.disabled = true;
            submitBtn.innerText = "Submitting...";
            statusDiv.className = "p-3 rounded-lg text-sm bg-blue-900/30 text-blue-400 border border-blue-800/50";
            statusDiv.innerText = "📤 Submitting product data...";
            statusDiv.classList.remove('hidden');

            // Collect form data
            const tgUser = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user : null;
            const productData = {
                code: document.getElementById('prodCode').value,
                name: document.getElementById('prodName').value,
                color: document.getElementById('color').value,
                fabric: document.getElementById('fabric').value,
                brand: document.getElementById('brand').value,
                cost: document.getElementById('costPrice').value,
                retail: document.getElementById('retailPrice').value,
                sale: document.getElementById('salePrice').value,
                stock: document.getElementById('totalStock').value,
                description: document.getElementById('description').value,
                images: document.getElementById('suitImages').value
                    .split('\n').map(s => s.trim()).filter(s => s.length > 0),
                submitted_by: tgUser ? `@${tgUser.username || tgUser.first_name}` : "Web User",
                submitted_at: new Date().toISOString()
            };

            // Validate PAT is configured
            if (GITHUB_PAT === "REPLACE_WITH_YOUR_FINE_GRAINED_PAT") {
                showStatus("❌ GitHub PAT not configured. Edit index.html and set GITHUB_PAT variable.", "error");
                submitBtn.disabled = false;
                submitBtn.innerText = "Save & Post to Channel";
                return;
            }

            // Create GitHub Issue with product data as JSON in the body
            const issueTitle = `[Product] ${productData.code} - ${productData.name}`;
            const issueBody = "```json\n" + JSON.stringify(productData, null, 2) + "\n```\n\n" +
                              "---\n*This issue was auto-created by the Telegram Catalog form. A GitHub Action will process it and post to the Telegram channel.*";

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_PAT}`,
                        'Accept': 'application/vnd.github+json',
                        'X-GitHub-Api-Version': '2022-11-28',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: issueTitle,
                        body: issueBody,
                        labels: ["pending-post"]
                    })
                });

                if (response.ok) {
                    const issue = await response.json();
                    showStatus(`✅ Product submitted! GitHub Action will post to Telegram channel within 1-2 minutes.\\n\\nIssue: ${issue.html_url}`, "success");

                    // Close Telegram Mini App after short delay
                    if (tg && tg.close) {
                        setTimeout(() => tg.close(), 3000);
                    }

                    // Reset form
                    document.getElementById('productForm').reset();
                } else {
                    const errorData = await response.json();
                    showStatus(`❌ Submission failed: ${errorData.message || response.statusText}\\n\\nMake sure GITHUB_PAT is valid and has "issues: write" permission.`, "error");
                }
            } catch (err) {
                showStatus(`❌ Network error: ${err.message}`, "error");
            }

            submitBtn.disabled = false;
            submitBtn.innerText = "Save & Post to Channel";
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('submitStatus');
            statusDiv.classList.remove('hidden');
            if (type === "success") {
                statusDiv.className = "p-3 rounded-lg text-sm bg-green-900/30 text-green-400 border border-green-800/50 whitespace-pre-wrap";
            } else if (type === "error") {
                statusDiv.className = "p-3 rounded-lg text-sm bg-red-900/30 text-red-400 border border-red-800/50 whitespace-pre-wrap";
            } else {
                statusDiv.className = "p-3 rounded-lg text-sm bg-blue-900/30 text-blue-400 border border-blue-800/50 whitespace-pre-wrap";
            }
            statusDiv.innerText = message;
        }
    </script>
</body>
</html>
